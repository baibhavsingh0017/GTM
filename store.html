<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Game Store</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a23;
      color: white;
      text-align: center;
    }

    h1 {
      padding: 40px;
      font-size: 50px;
    }

    .games {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }

    .card {
      background: #1a1a40;
      padding: 20px;
      border-radius: 10px;
      width: 220px;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .btn {
      margin-top: 15px;
      display: inline-block;
      padding: 10px 20px;
      background: #7b5cff;
      color: white;
      text-decoration: none;
      border-radius: 20px;
    }

    .btn:hover {
      background: #a78bfa;
    }
  </style>
</head>
<body>

  <h1>GAME STORE</h1>

  <div class="games">

    <div class="card">
      <img src="https://via.placeholder.com/200x250" alt="Spider-Man 2">
      <h3>Spider-Man 2</h3>
      <a href="thankyou.html" class="btn">BUY NOW</a>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200x250" alt="God of War">
      <h3>God of War</h3>
      <a href="thankyou.html" class="btn">BUY NOW</a>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200x250" alt="Cyberpunk">
      <h3>Cyberpunk</h3>
      <a href="thankyou.html" class="btn">BUY NOW</a>
    </div>

  </div>

</body>
</html>
