<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GamesHub</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    }

    .container {
      padding-top: 150px;
    }

    h1 {
      font-size: 60px;
      letter-spacing: 3px;
    }

    p {
      font-size: 28px;
      margin: 20px 0;
    }

    .btn {
      padding: 15px 35px;
      font-size: 18px;
      background: #7b5cff;
      color: white;
      border: none;
      border-radius: 30px;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: #a78bfa;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>GAMESHUB</h1>
    <p>Your one-stop video game centre</p>
    <a href="store.html" class="btn">SHOP NOW →</a>
  </div>

</body>
</html>
